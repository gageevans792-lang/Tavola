name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - claude/tavola-nextjs-setup-sXYkd
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Fetch project info
        id: info
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "=== Project info ==="
          curl -s "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | tee /tmp/project.json | jq '{id,name,accountId}'
          ORG_ID=$(jq -r '.accountId' /tmp/project.json)
          echo "org_id=$ORG_ID" >> $GITHUB_OUTPUT
          echo "Org ID: $ORG_ID"

      - name: Link project
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json << EOF
          {"projectId":"$VERCEL_PROJECT_ID","orgId":"${{ steps.info.outputs.org_id }}"}
          EOF
          cat .vercel/project.json

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== Deploying to production ==="
          vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1
          echo "=== Deploy exit code: $? ==="
